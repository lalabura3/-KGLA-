# 学知图谱 — CI/CD Pipeline
# GitHub Actions workflow for automated testing and quality gates.

name: 学知图谱 CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  POETRY_VERSION: "1.8"

jobs:
  # ═══════════════════════════════════════════
  # Stage 1: Lint & Static Analysis
  # ═══════════════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python linters
        run: |
          pip install ruff mypy

      - name: Ruff check (backend)
        run: ruff check backend/

      - name: Mypy type check (backend)
        run: mypy backend/ --ignore-missing-imports

      # ── TypeScript ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: ESLint (frontend)
        run: cd frontend && npm run lint

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

  # ═══════════════════════════════════════════
  # Stage 2: Unit Tests
  # ═══════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      # ── Backend Unit Tests ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python test deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r tests/python/requirements.txt

      - name: Run backend unit tests (pytest)
        run: |
          cd backend
          pytest ../tests/python/ \
            -m "not slow and not integration and not e2e" \
            --cov=. \
            --cov-report=xml:../reports/coverage/python/coverage.xml \
            --cov-report=html:../reports/coverage/python/html \
            --cov-fail-under=70 \
            --junitxml=../reports/test-results/python/junit.xml \
            -v \
            -n auto
        continue-on-error: false

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-python
          path: reports/coverage/python/

      # ── Frontend Unit Tests ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend unit tests (Jest)
        run: |
          cd frontend
          npx jest --coverage \
            --coverageDirectory=../reports/coverage/frontend/ \
            --maxWorkers=2 \
            --ci
        continue-on-error: false

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: reports/coverage/frontend/

  # ═══════════════════════════════════════════
  # Stage 3: Integration Tests
  # ═══════════════════════════════════════════
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xuezhitupu_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r tests/python/requirements.txt

      - name: Run migrations
        run: cd backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/xuezhitupu_test

      - name: Run integration tests
        run: |
          cd backend
          pytest ../tests/python/ \
            -m "integration" \
            --cov-append \
            --cov=. \
            --junitxml=../reports/test-results/python/integration-junit.xml \
            -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/xuezhitupu_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

  # ═══════════════════════════════════════════
  # Stage 4: E2E Smoke Tests (PR only)
  # ═══════════════════════════════════════════
  e2e-smoke:
    name: E2E Smoke (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install test deps
        run: cd tests/frontend && npm ci

      - name: Install Playwright browsers
        run: cd tests/frontend && npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E smoke tests
        run: |
          cd tests/frontend
          npx playwright test \
            --project=${{ matrix.browser }} \
            --grep "Cross-Browser Smoke|Video Upload Flow|AI Notes|Knowledge Graph" \
            --reporter=html,json,junit
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ matrix.browser }}
          path: tests/frontend/reports/playwright/

  # ═══════════════════════════════════════════
  # Stage 5: Full E2E Matrix (Main only)
  # ═══════════════════════════════════════════
  e2e-full:
    name: E2E Full (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, iPad, iPad-Pro]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install test deps
        run: cd tests/frontend && npm ci

      - name: Install Playwright browsers
        run: cd tests/frontend && npx playwright install --with-deps

      - name: Run full E2E
        run: |
          cd tests/frontend
          npx playwright test \
            --project="${{ matrix.project }}" \
            --reporter=html,json,junit
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-full-${{ matrix.project }}
          path: tests/frontend/reports/playwright/

  # ═══════════════════════════════════════════
  # Stage 6: Performance Check (Main only)
  # ═══════════════════════════════════════════
  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: pip install -r tests/python/requirements.txt

      - name: Run performance tests
        run: |
          cd backend
          pytest ../tests/python/ \
            -m "performance" \
            --timeout=1800 \
            --junitxml=../reports/test-results/performance-junit.xml \
            -v

      - name: Run WER benchmark (synthetic)
        run: |
          cd tests/wer
          python wer_benchmark.py init --output /tmp/wer_manifest.json
          # Full evaluation requires GPU — placeholder
          echo "WER benchmark manifest ready for GPU evaluation"

  # ═══════════════════════════════════════════
  # Build Check
  # ═══════════════════════════════════════════
  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: xuezhitupu-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: xuezhitupu-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════
  # Quality Gate Summary
  # ═══════════════════════════════════════════
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, build]
    if: always()
    steps:
      - name: Check quality gate
        run: |
          echo "## 🛡️ Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          for job in lint unit-tests integration-tests build; do
            result="${{ needs[$job].result }}"
            icon="$([ "$result" = "success" ] && echo "✅" || echo "❌")"
            echo "- $icon **$job**: $result" >> $GITHUB_STEP_SUMMARY
            if [ "$result" != "success" ]; then
              FAILED=1
            fi
          done

          if [ $FAILED -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ All quality gates passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Quality gate FAILED — see above for details" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
