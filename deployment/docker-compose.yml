version: '3.8'

# =============================================================================
# 学知图谱 — 生产级 Docker Compose 编排
# GPU 分区方案: GPU#0 Whisper | GPU#1-2 LLM | GPU#3 缓冲
# =============================================================================

services:
  # =========================================================================
  # 基础设施层
  # =========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: learnflow-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-learnflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-learnflow_secret}
      - POSTGRES_DB=${POSTGRES_DB:-learnflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnflow} -d ${POSTGRES_DB:-learnflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - learnflow-net

  redis:
    image: redis:7-alpine
    container_name: learnflow-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - learnflow-net

  # =========================================================================
  # AI 推理服务层 — 双 4090 GPU 分区
  # =========================================================================

  # Whisper ASR — 独占 GPU#0（设备编号 0）
  whisper:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.whisper
    container_name: learnflow-whisper
    ports:
      - "8001:8001"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - NVIDIA_VISIBLE_DEVICES=0
      - PORT=8001
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - learnflow-net

  # LLM 推理 — 占用 GPU#1-2（设备编号 1,2），支持 tensor parallel
  llm:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.llm
    container_name: learnflow-llm
    ports:
      - "8002:8002"
    environment:
      - LLM_MODE=${LLM_MODE:-api}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_LOCAL_MODEL_PATH=/models
      - NVIDIA_VISIBLE_DEVICES=1,2
      - PORT=8002
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1", "2"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - learnflow-net
    # 本地模型模式：取消注释以挂载模型文件
    # volumes:
    #   - ${LLM_MODEL_PATH:-/data/models}:/models:ro

  # =========================================================================
  # 应用服务层
  # =========================================================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnflow-backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://learnflow:learnflow_secret@postgres:5432/learnflow}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - WHISPER_URL=http://whisper:8001
      - LLM_URL=http://llm:8002
      - LLM_MODE=${LLM_MODE:-api}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-500}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      whisper:
        condition: service_healthy
      llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - learnflow-net

  # Celery Worker — 异步视频处理
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnflow-celery
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://learnflow:learnflow_secret@postgres:5432/learnflow}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379/1}
      - WHISPER_URL=http://whisper:8001
      - LLM_URL=http://llm:8002
      - LLM_MODE=${LLM_MODE:-api}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - UPLOAD_DIR=/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - learnflow-net
    profiles:
      - full
      - celery

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnflow-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - learnflow-net

  # =========================================================================
  # Nginx 反向代理（可选）
  # =========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: learnflow-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - learnflow-net
    profiles:
      - full
      - nginx

# =============================================================================
# 持久化存储卷
# =============================================================================

volumes:
  postgres_data:
    driver: local
    name: learnflow_postgres_data
  redis_data:
    driver: local
    name: learnflow_redis_data
  uploads_data:
    driver: local
    name: learnflow_uploads_data

# =============================================================================
# 网络
# =============================================================================

networks:
  learnflow-net:
    driver: bridge
    name: learnflow-net
